<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our First WEbsite</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Background -->
<div class="background">
    <div class="stars"></div>
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>
</div>

<!-- Floating Hearts -->
<div id="particles"></div>

<!-- Main -->
<main class="hero">

    <p class="small-text">
        A little place I made...
    </p>

    <h1>
        The Appreciation<br>
        Museum
    </h1>

    <div class="divider"></div>

    <p class="description">
        There are millions of websites on the internet.
        <br><br>
        But this one exists for only one person.
    </p>

    <button id="enterButton">
        Enter →
    </button>

</main>

<!-- Intro Overlay -->
<section id="introOverlay">

    <div class="letter">

        <span class="museum-label">
            Exhibit 001
        </span>

        <h2>Hello, Love.</h2>

        <p id="typingText"></p>

        <button id="continueButton">
            Continue
        </button>

    </div>

</section>

<!-- Audio -->
<audio id="bgMusic" loop>
    <source src="" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
