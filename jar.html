<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gratitude Jar</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="jar.css">

</head>

<body>

<header>

<h1>The Gratitude Jar</h1>

<p>
Every heart inside this jar holds a simple thank you.
Take one whenever you'd like.
</p>

</header>

<div class="table">

<div id="jar">

<div id="hearts"></div>

</div>

</div>

<div id="popup">

<div class="note">

<h2>Thank You ❤️</h2>

<p id="noteText"></p>

<button id="closeNote">
Fold It Back
</button>

</div>

</div>

<div id="counter">
0 / 30 Hearts
</div>

<script src="jar.js"></script>

</body>

</html>
