<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Letter Room</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="letters.css">

</head>

<body>

<header>

<h1>The Letter Room</h1>

<p>
Some words are meant to be opened
exactly when they're needed.
</p>

</header>

<section class="letters">

<div class="envelope" data-title="Open when you're happy">
📩
<span>You're Happy</span>
</div>

<div class="envelope" data-title="Open when you're sad">
📩
<span>You're Sad</span>
</div>

<div class="envelope" data-title="Open when you're stressed">
📩
<span>You're Stressed</span>
</div>

<div class="envelope" data-title="Open when you miss me">
📩
<span>You Miss Me</span>
</div>

<div class="envelope" data-title="Open when you doubt yourself">
📩
<span>You Doubt Yourself</span>
</div>

<div class="envelope" data-title="Open when you can't sleep">
📩
<span>You Can't Sleep</span>
</div>

<div class="envelope" data-title="Open on your birthday">
📩
<span>Your Birthday</span>
</div>

<div class="envelope" data-title="Open anytime">
💌
<span>Anytime</span>
</div>

</section>

<div id="overlay">

<div class="letter">

<h2 id="letterTitle"></h2>

<div id="letterBody">

</div>

<button id="closeLetter">
Close Letter
</button>

</div>

</div>

<script src="letters.js"></script>

</body>

</html>
