<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Secret Room</title>


<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Cormorant+Garamond:wght@600&family=Caveat:wght@600&display=swap" rel="stylesheet">


<link rel="stylesheet" href="secret.css">


</head>



<body>



<div class="ambient ambient-one"></div>

<div class="ambient ambient-two"></div>





<!-- =====================
     SECRET ROOM
===================== -->


<section id="secretRoom">


<header class="hero">


<h1>
The Secret Room
</h1>


<p>

You found the hidden place.

<br>

A small gift filled with something I wanted to share.

</p>


</header>





<div class="board">



<div class="polaroid">

<img src="mayee.jpg">

<p>You
</p>

</div>




<div class="polaroid">

<img src="lunabelle-removebg-preview.png">

<p>
Lunabelle
</p>

</div>





<div class="polaroid">

<img src="me.jpg">

<p>
Me
</p>

</div>





<div class="gift-card">


<div class="gift-icon">
🎁
</div>


<h2>
A Gift For You
</h2>


<p>
I saved something special inside.
</p>



<button id="openGift">

Open Gift ❤️

</button>



</div>



</div>



</section>









<!-- =====================
     GIFT SCREEN
===================== -->


<section id="giftScreen">


<div class="gift-wrapper">


<h2>
A Little Surprise...
</h2>


<p>
Click the gift to open it.
</p>




<div class="gift-box">


<div class="lid"></div>

<div class="box"></div>

<div class="ribbon"></div>

<div class="bow">
🎀
</div>

<div class="glow"></div>


</div>



</div>


</section>









<!-- =====================
     VIDEO + LETTER
===================== -->


<section id="theater">


<div class="theater-container">



<!-- VIDEO -->

<div class="video-panel">


<div class="frame">


<video 
id="giftVideo"
controls
loop
autoplay
muted>


<source 
src="ce64b706-41b9-46e2-92e9-bee9b5dfd67c.mp4"
type="video/mp4">


</video>



</div>


</div>







<!-- LETTER -->

<div class="letter-panel">


<div class="letter">


<h2>
Dearest Mariel,
</h2>



<p id="letterText"></p>



<h3>
❤️
</h3>



</div>



</div>




</div>


</section>






<div id="fade"></div>



<script src="secret.js"></script>


</body>


</html>
