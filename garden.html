<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bloom Garden</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="garden.css">

</head>

<body>

<header>

<h1>The Bloom Garden</h1>

<p>
Every flower blooms because of something
I appreciate about you.
</p>

</header>

<section class="garden">

<div class="flower" data-message="I appreciate how your smile can brighten even my hardest days.">
🌸
</div>

<div class="flower" data-message="Thank you for always being patient with me.">
🌼
</div>

<div class="flower" data-message="I admire how kind your heart is.">
🌹
</div>

<div class="flower" data-message="You make ordinary days feel special.">
🪻
</div>

<div class="flower" data-message="Thank you for simply being yourself.">
🌺
</div>

<div class="flower" data-message="Your laugh is one of my favorite sounds.">
🌻
</div>

<div class="flower" data-message="You inspire me to become a better person every day.">
🌷
</div>

<div class="flower" data-message="You make me feel at home.">
💮
</div>

</section>

<div id="popup">

<div class="card">

<h2>A Flower Bloomed 🌸</h2>

<p id="message"></p>

<button id="close">
Close
</button>

</div>

</div>

<script src="garden.js"></script>

</body>

</html>
